site_name: scikit-opls
site_description: Orthogonal PLS (OPLS / OPLS-DA) with a scikit-learn interface
repo_url: https://github.com/HauserGroup/scikit-opls
repo_name: HauserGroup/scikit-opls
watch: [docs, src/scikit_opls, CHANGES.md]

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            members_order: source
            show_source: false

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - API Reference:
      - OPLS: api/opls.md
      - Selection: api/selection.md
      - OPLS-DA: api/opls_da.md
      - Inspection: api/inspection.md
      - Plotting: api/plotting.md
      - Validation: api/validation.md
  - Changelog: changelog.md
